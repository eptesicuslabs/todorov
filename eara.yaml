train_script: "notebooks/autoresearch/train.py"
metric: "best_val_bpb"
metric_direction: "lower"

compute: "kaggle"

kaggle:
  kernel_ref: "dttdrv/todorov-autoresearch"
  notebook_dir: "notebooks/autoresearch"
  output_dir: "notebooks/autoresearch/output"
  accelerator: "NvidiaTeslaT4"
  api_token_env: "KAGGLE_API_TOKEN"

time_budget_minutes: 120

gates:
  bpb_ratio:
    metric: "bpb_ratio"
    threshold: "<= 1.5"
  spike_mi:
    metric: "spike_mi"
    threshold: "> 0.1"
  spike_cka:
    metric: "spike_cka"
    threshold: "> 0.3"
  spike_fr:
    metric: "spike_firing_rate"
    threshold: "0.3 - 0.6"
  perplexity_stable:
    metric: "phase2.perplexity"
    threshold: "< 20% increase"

knowledge_dir: "knowledge"
docs_dir: "docs"
state_dir: "state"
