eara_version: "2.0"
project: "todorov"
description: "biological neural computation hybrid architecture"

strictness: ultra
mode: loop

train_script: "notebooks/autoresearch/train.py"
metric: "best_val_bpb"
metric_direction: "lower"

compute: "kaggle"

kaggle:
  kernel_ref: "dttdrv/todorov-autoresearch"
  notebook_dir: "notebooks/autoresearch"
  output_dir: "notebooks/autoresearch/output"
  accelerator: "NvidiaTeslaT4"
  api_token_env: "KAGGLE_API_TOKEN"

time_budget_minutes: 120

gates:
  build:
    command: "python -m pytest tests/ -q"
    required: true
  spec_compliance:
    type: subagent
    required: true
  spatial_classify:
    metric: "spatial_classify_accuracy"
    threshold: "> transformer_accuracy"
  spatial_dynamics:
    metric: "nbody_mae"
    threshold: "< transformer_mae"
  equivariance_test:
    metric: "equivariance_error_60deg"
    threshold: "< 0.05"
  language_no_degrade:
    metric: "bpb_degradation_pct"
    threshold: "<= 10.0"

review:
  default_policy: full
  reviewers:
    spec_compliance:
      enabled: true
    code_quality:
      enabled: true
    calibration:
      enabled: true
      sample_size: 3
  evidence_requirements:
    require_quotes: true
    require_line_numbers: true
    require_file_sizes: true
  iterative_refinement:
    enabled: true
    max_iterations: 5

logging:
  results_file: "results.tsv"
  auto_log: true
  log_dispatches: true
  log_review_findings: true

loop:
  behavior:
    never_stop: true
    auto_commit_on_keep: true
    auto_revert_on_discard: true
    pause_on_gate_failure: false
  context_reset:
    enabled: true
    interval_iterations: 10
    interval_minutes: 180
  termination:
    metric_target: null
    max_iterations: null
    time_budget_minutes: null

knowledge_dir: "knowledge"
docs_dir: "docs"
state_dir: "state"

source_files:
  - "notebooks/autoresearch/train.py"
