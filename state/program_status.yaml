next_action: "the next paid run is no longer another LM training on fineweb-edu. five consecutive paid runs (god_run, god_run_v2, run1_baseline_noerasure, run2_slot_memory, run2_slot_memory_retention_fixed) have produced 0% passkey at 256 tokens across two substrates and two retention regimes. the consistent 0% under all combinations of architectural variables tested, combined with cpu gates A and B passing in isolation, points the diagnosis at the training objective. analysis at neuroloc/wiki/synthesis/training_objective_vs_architectural_goal.md. the next paid run must train on a corpus shaped to require memory: synthetic cognition curriculum (passkey, copy, associative recall, simple algorithmic), mixed pretraining (70% fineweb plus 30% synthetic cognition), or two-phase pretraining (synthetic cognition until passkey > 0 then fineweb for general competence). measurement bar is not nonzero passkey alone; per allen-zhu et al. 2024 a successful paid run must demonstrate exceeding the ~2-3 bits-per-parameter knowledge ceiling of vanilla transformers at matched parameter count. before launch, build the synthetic cognition corpus generator and a passkey-shaped training pipeline in the project. the existing infrastructure (NM_AUTHORIZE_FULL_RUN gate, retrieval_gate persistence, fail-closed eval, _assert_preset_retention_safe, FLA pinned in requirements.txt) all remains correct and reusable. in parallel: phase 6a aesthetic logging from next_gen.md remains a standalone low-risk track."
